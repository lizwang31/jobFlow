name: Daily Job Status Check

on:
  schedule:
    # 每天 UTC 09:00 运行 = 北京时间 17:00
    - cron: '0 9 * * *'
  workflow_dispatch:
    # 支持手动触发，可在 GitHub Actions 页面点按钮运行
    inputs:
      dry_run:
        description: '试运行（只检查不写入）'
        required: false
        default: 'false'

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job status checker
        env:
          NOTION_TOKEN:   ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:   ${{ secrets.NOTION_DB_ID }}
          GMAIL_CREDS:    ${{ secrets.GMAIL_CREDS }}      # 可选
          DRY_RUN:        ${{ github.event.inputs.dry_run || 'false' }}
        run: python checker.py

      - name: Upload run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-report-${{ github.run_number }}
          path: report.json
          retention-days: 30
